<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Userbot Dashboard</title>
    <script>
      (function(){try{var t=localStorage.getItem('ub-theme');if(t!=='light'){document.documentElement.classList.add('dark');}}catch(e){document.documentElement.classList.add('dark');}})();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {
                fontFamily: { sans:['Work Sans','sans-serif'], display:['Space Grotesk','sans-serif'], mono:['Space Mono','monospace'] },
                colors: {
                    gray: {50:'rgb(var(--g50)/<alpha-value>)',100:'rgb(var(--g100)/<alpha-value>)',200:'rgb(var(--g200)/<alpha-value>)',300:'rgb(var(--g300)/<alpha-value>)',400:'rgb(var(--g400)/<alpha-value>)',500:'rgb(var(--g500)/<alpha-value>)',600:'rgb(var(--g600)/<alpha-value>)',700:'rgb(var(--g700)/<alpha-value>)',800:'rgb(var(--g800)/<alpha-value>)',900:'rgb(var(--g900)/<alpha-value>)',950:'rgb(var(--g950)/<alpha-value>)'},
                    blue: {300:'rgb(var(--b300)/<alpha-value>)',400:'rgb(var(--b400)/<alpha-value>)',500:'rgb(var(--b500)/<alpha-value>)',600:'rgb(var(--b600)/<alpha-value>)',700:'rgb(var(--b700)/<alpha-value>)'},
                    indigo: {300:'rgb(var(--b300)/<alpha-value>)',400:'rgb(var(--b400)/<alpha-value>)',500:'rgb(var(--b500)/<alpha-value>)',600:'rgb(var(--b600)/<alpha-value>)',700:'rgb(var(--b700)/<alpha-value>)'},
                    red: {300:'rgb(var(--r300)/<alpha-value>)',400:'rgb(var(--r400)/<alpha-value>)',500:'rgb(var(--r500)/<alpha-value>)',600:'rgb(var(--r600)/<alpha-value>)',900:'rgb(var(--r900)/<alpha-value>)'}
                }
            } }
        }
    </script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm mx-auto p-6">
    <div class="card p-8">
        <div class="text-center mb-8">
            <div class="nb-logo mx-auto mb-3" style="width:3rem;height:3rem;"><i data-lucide="zap"></i></div>
            <h1 class="text-2xl font-bold font-display">Userbot</h1>
            <p class="text-gray-400 mt-1 font-mono text-xs uppercase tracking-wide">Login ke Dashboard</p>
        </div>

        <div id="error-msg" class="hidden mb-4 p-3 border-2 border-red-500 bg-red-900 text-red-300 text-sm"></div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-400 mb-1 font-mono uppercase tracking-wide">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-2.5" placeholder="username">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-400 mb-1 font-mono uppercase tracking-wide">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2.5" placeholder="password">
            </div>
            <button type="submit" class="w-full py-2.5 bg-blue-600 text-white font-bold font-mono uppercase tracking-wide">Login</button>
        </form>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); }</script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('error-msg');
    err.classList.add('hidden');
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        if (res.ok) {
            let data = {};
            try { data = await res.json(); } catch (e) {}
            window.location.href = data.must_change_password ? '/change-password' : '/dashboard';
        } else {
            const data = await res.json();
            err.textContent = data.detail || 'Login gagal';
            err.classList.remove('hidden');
        }
    } catch {
        err.textContent = 'Koneksi error';
        err.classList.remove('hidden');
    }
});
</script>
</body>
</html>
