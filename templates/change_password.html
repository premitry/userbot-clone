<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Password — Userbot Dashboard</title>
    <script>
      (function(){try{var t=localStorage.getItem('ub-theme');if(t!=='light'){document.documentElement.classList.add('dark');}}catch(e){document.documentElement.classList.add('dark');}})();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {
                fontFamily: { sans:['Work Sans','sans-serif'], display:['Space Grotesk','sans-serif'], mono:['Space Mono','monospace'] },
                colors: {
                    gray: {50:'rgb(var(--g50)/<alpha-value>)',100:'rgb(var(--g100)/<alpha-value>)',200:'rgb(var(--g200)/<alpha-value>)',300:'rgb(var(--g300)/<alpha-value>)',400:'rgb(var(--g400)/<alpha-value>)',500:'rgb(var(--g500)/<alpha-value>)',600:'rgb(var(--g600)/<alpha-value>)',700:'rgb(var(--g700)/<alpha-value>)',800:'rgb(var(--g800)/<alpha-value>)',900:'rgb(var(--g900)/<alpha-value>)',950:'rgb(var(--g950)/<alpha-value>)'},
                    blue: {300:'rgb(var(--b300)/<alpha-value>)',400:'rgb(var(--b400)/<alpha-value>)',500:'rgb(var(--b500)/<alpha-value>)',600:'rgb(var(--b600)/<alpha-value>)',700:'rgb(var(--b700)/<alpha-value>)'},
                    indigo: {300:'rgb(var(--b300)/<alpha-value>)',400:'rgb(var(--b400)/<alpha-value>)',500:'rgb(var(--b500)/<alpha-value>)',600:'rgb(var(--b600)/<alpha-value>)',700:'rgb(var(--b700)/<alpha-value>)'},
                    red: {300:'rgb(var(--r300)/<alpha-value>)',400:'rgb(var(--r400)/<alpha-value>)',500:'rgb(var(--r500)/<alpha-value>)',600:'rgb(var(--r600)/<alpha-value>)',900:'rgb(var(--r900)/<alpha-value>)'}
                }
            } }
        }
    </script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm mx-auto p-6">
    <div class="card p-8">
        <div class="text-center mb-6">
            <div class="nb-logo mx-auto mb-3" style="width:3rem;height:3rem;"><i data-lucide="shield"></i></div>
            <h1 class="text-xl font-bold font-display">Ganti Password</h1>
            <p class="text-gray-400 mt-1 font-mono text-xs uppercase tracking-wide">Wajib sebelum lanjut</p>
        </div>

        <div id="error-msg" class="hidden mb-4 p-3 border-2 border-red-500 bg-red-900 text-red-300 text-sm"></div>
        <div id="ok-msg" class="hidden mb-4 p-3 border-2 border-green-500 bg-green-900 text-green-300 text-sm"></div>

        <form id="cp-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-400 mb-1 font-mono uppercase tracking-wide">Password Lama</label>
                <input type="password" id="current" required class="w-full px-4 py-2.5" placeholder="password saat ini">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-400 mb-1 font-mono uppercase tracking-wide">Password Baru</label>
                <input type="password" id="newpass" required minlength="6" class="w-full px-4 py-2.5" placeholder="min. 6 karakter">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-400 mb-1 font-mono uppercase tracking-wide">Ulangi Password Baru</label>
                <input type="password" id="confirm" required minlength="6" class="w-full px-4 py-2.5" placeholder="ulangi password baru">
            </div>
            <button type="submit" class="w-full py-2.5 bg-blue-600 text-white font-bold font-mono uppercase tracking-wide">Simpan & Lanjut</button>
        </form>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); }</script>
<script>
document.getElementById('cp-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('error-msg');
    const ok = document.getElementById('ok-msg');
    err.classList.add('hidden'); ok.classList.add('hidden');
    const cur = document.getElementById('current').value;
    const np = document.getElementById('newpass').value;
    const cf = document.getElementById('confirm').value;
    if (np.length < 6) { err.textContent = 'Password baru minimal 6 karakter'; err.classList.remove('hidden'); return; }
    if (np !== cf) { err.textContent = 'Konfirmasi password tidak cocok'; err.classList.remove('hidden'); return; }
    try {
        const res = await fetch('/api/settings/change-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'same-origin',
            body: JSON.stringify({ current_password: cur, new_password: np }),
        });
        if (res.ok) {
            ok.textContent = 'Password berhasil diganti. Mengalihkan...';
            ok.classList.remove('hidden');
            setTimeout(function(){ window.location.href = '/dashboard'; }, 800);
        } else {
            let data = {};
            try { data = await res.json(); } catch (e) {}
            err.textContent = data.detail || 'Gagal mengganti password';
            err.classList.remove('hidden');
        }
    } catch {
        err.textContent = 'Koneksi error';
        err.classList.remove('hidden');
    }
});
</script>
</body>
</html>
